<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Startup Radar | B2B & Clean Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F8F9FA; --cream-dark: #E9ECEF; --charcoal: #212529;
      --charcoal-mid: #343A40; --accent: #007BFF; --accent-lt: #CCE5FF;
      --accent-dk: #0056B3; --text: #212529; --muted: #6C757D;
      --border: #DEE2E6; --surface: #FFFFFF; --radius: 10px;
      --shadow: 0 1px 3px rgba(33,37,41,.07), 0 2px 8px rgba(33,37,41,.04);
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    header { background: var(--charcoal); color: #fff; padding: 14px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; border-bottom: 1px solid #1A1D20; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -.5px; }
    .header-title { font-size: 16px; font-weight: 700; color: #F8F9FA; }
    .header-sub { font-size: 11px; color: #ADB5BD; margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    #last-updated { font-size: 11px; color: #ADB5BD; }
    #refresh-btn { background: var(--charcoal-mid); color: #E9ECEF; border: 1px solid #495057; border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s, color .15s; font-family: inherit; }
    #refresh-btn:hover { background: #495057; color: #FFF; }
    #refresh-btn.spinning svg { animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tabs-wrap { background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; position: sticky; top: 63px; z-index: 90; }
    .tabs-wrap::-webkit-scrollbar { display: none; }
    .tabs { display: flex; padding: 0 16px; min-width: max-content; }
    .tab { padding: 11px 15px; font-size: 13px; font-weight: 500; color: var(--muted); border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; transition: color .15s, border-color .15s; display: flex; align-items: center; gap: 7px; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tab-count { background: var(--cream-dark); color: var(--muted); font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 20px; }
    main { max-width: 1120px; margin: 0 auto; padding: 22px 16px 60px; }
    #progress-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 18px; overflow: hidden; display: none; }
    #progress-wrap.visible { display: block; }
    #progress-bar { height: 100%; width: 4%; background: var(--accent); border-radius: 2px; transition: width .4s ease; }
    #status-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; min-height: 20px; }
    #status-msg { font-size: 12px; color: var(--muted); }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
    .card-wrap { position: relative; overflow: hidden; border-radius: var(--radius); }
    .card-under { position: absolute; inset: 0; background: #DC3545; border-radius: var(--radius); display: flex; align-items: center; justify-content: flex-end; padding-right: 22px; color: #fff; font-size: 13px; font-weight: 600; gap: 8px; opacity: 0; pointer-events: none; }
    .card-wrap.swipe-on .card-under { opacity: 1; }
    .card { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 17px; display: flex; flex-direction: column; gap: 9px; animation: fadeUp .25s ease; touch-action: pan-y; will-change: transform; }
    @keyframes fadeUp { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }
    .card.swiping { transition: none; }
    .card.snap-back { transition: transform .2s ease; }
    .card.flying { transition: transform .25s ease, opacity .25s ease; opacity: 0; }
    .card-wrap.collapsing { transition: max-height .25s ease, opacity .25s ease, margin .25s ease; max-height: 0 !important; opacity: 0; }
    .card-top { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .badge { font-size: 10px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; }
    .card-src { font-size: 11px; color: var(--muted); margin-left: auto; font-weight: 500; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-title { font-size: 14px; font-weight: 600; line-height: 1.45; color: var(--text); }
    .card-title a { color: inherit; text-decoration: none; }
    .card-title a:hover { color: var(--accent); }
    .card-excerpt { font-size: 13px; color: var(--muted); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-foot { margin-top: auto; display: flex; align-items: center; justify-content: space-between; padding-top: 4px; gap: 8px; }
    .card-date { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .card-actions { display: flex; align-items: center; gap: 12px; }
    .act-btn { font-size: 12px; font-weight: 600; color: var(--accent); text-decoration: none; background: none; border: none; cursor: pointer; font-family: inherit; padding: 2px 0; }
    .act-btn:hover { color: var(--accent-dk); }
    .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }

    /* Reader modal */
    #reader { position: fixed; inset: 0; background: var(--cream); z-index: 400; display: none; flex-direction: column; }
    #reader.open { display: flex; }
    .reader-bar { background: var(--charcoal); color: #F0EBE1; padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .reader-bar .title { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .rbtn { background: var(--charcoal-mid); color: #C8BEB4; border: 1px solid #3A3430; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .rbtn:hover { background: #3A3430; color: #F0EBE1; }
    #reader-body { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 24px 18px 80px; }
    .reader-inner { max-width: 680px; margin: 0 auto; }
    .reader-inner h1 { font-size: 22px; line-height: 1.3; margin-bottom: 8px; }
    .reader-meta { font-size: 12px; color: var(--muted); margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .reader-meta a { color: var(--accent); }
    .reader-inner p { font-size: 15px; line-height: 1.7; margin-bottom: 14px; }
    .reader-inner h2, .reader-inner h3 { font-size: 17px; margin: 22px 0 10px; }
    .reader-loading { text-align: center; padding: 60px 0; color: var(--muted); font-size: 14px; }
    .reader-blocked { text-align: center; padding: 40px 20px; }
    .reader-blocked p { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
    .reader-blocked a { color: var(--accent); font-weight: 600; text-decoration: none; }
    .reader-blocked a:hover { color: var(--accent-dk); }
    @media print {
      body > header, .tabs-wrap, main { display: none !important; }
      #reader { position: static; display: block !important; background: #fff; }
      .reader-bar { display: none !important; }
      #reader-body { overflow: visible; padding: 0; }
    }
    @media (max-width: 500px) {
      header { padding: 10px 14px; }
      .header-title { font-size: 14px; }
      #grid { grid-template-columns: 1fr; }
      .tab { padding: 10px 11px; font-size: 12px; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo">SR</div>
    <div>
      <div class="header-title">Early-Stage Radar</div>
      <div class="header-sub">Map Tech · Renewables · Legacy B2B</div>
    </div>
  </div>
  <div class="header-right">
    <span id="last-updated"></span>
    <button id="refresh-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Refresh
    </button>

<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
<main>
  <div id="progress-wrap"><div id="progress-bar"></div></div>

  <div id="grid"></div>
</main>

<div id="reader">
  <div class="reader-bar">
    <button class="rbtn" id="reader-close">← Back</button>

    <button class="rbtn" id="reader-pdf">PDF</button>
  </div>
  <div id="reader-body"><div class="reader-inner" id="reader-inner"></div></div>
</div>

<script>
/* ============================================================
   STARTUP RADAR — with D1-backed dismiss sync
   ============================================================ */

const API_BASE    = 'https://nsl-proxy.haydenmterjeson.workers.dev';
const PROXY_BASE  = API_BASE + '/?url=';
const JINA_READER_BASE = 'https://r.jina.ai/';

const FETCH_TIMEOUT_MS        = 15000;
const READER_FETCH_TIMEOUT_MS = 20000;
const FETCH_RETRY_DELAY_MS    = 1200;
const MAX_AGE_MS              = 6 * 30.44 * 24 * 60 * 60 * 1000;
const HIDDEN_RETENTION_MS     = MAX_AGE_MS;

// ── Device identity ───────────────────────────────────────────
// A stable random ID stored in localStorage. Passed with every
// /api/feedback call so the D1 database can attribute dismisses
// to this device and return them on the next /api/state load.
function getDeviceId() {
  let id = localStorage.getItem('sr_device_id');
  if (!id) {
    id = 'dev_' + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
    localStorage.setItem('sr_device_id', id);
  }
  return id;
}
const DEVICE_ID = getDeviceId();

// ── Noise filters ─────────────────────────────────────────────
const STOCK_NOISE_TERMS   = ['nasdaq','nyse','price target','buy rating','sell rating','analyst','market cap','p/e ratio','wall street','zacks rank','dow jones'];
const STOCK_NOISE_SOURCES = ['fool.com','zacks','marketbeat','benzinga','tipranks','seekingalpha','investorplace','nasdaq.com','finance.yahoo'];

function isStockNoise(a) {
  const blob = `${a.title} ${a.excerpt}`.toLowerCase();
  const src  = (a.source || '').toLowerCase();
  if (STOCK_NOISE_SOURCES.some(s => src.includes(s))) return true;
  return STOCK_NOISE_TERMS.filter(t => blob.includes(t)).length >= 2;
}

// ── Feed definitions ──────────────────────────────────────────
const FEEDS = [
  {
    id: 'cleantech', label: 'Clean Tech & Renewables', color: '#2A9D8F', bg: '#E4F4F2',
    sources: [
      { type: 'bing',   query: '"climate tech" startup' },
      { type: 'bing',   query: '"climate tech" funding' },
      { type: 'bing',   query: '"clean tech" startup' },
      { type: 'bing',   query: '"clean tech" seed' },
      { type: 'bing',   query: '"renewable energy" startup' },
      { type: 'bing',   query: '"renewable energy" funding' },
      { type: 'bing',   query: '"carbon capture" startup' },
      { type: 'google', query: '("climate tech" OR "clean tech") (startup OR funding OR seed)' },
      { type: 'google', query: '("renewable energy" OR "carbon capture") (startup OR funding)' },
      { type: 'direct', url: 'https://www.canarymedia.com/rss.rss', source: 'Canary Media' },
    ]
  },
  {
    id: 'maptech', label: 'Map Tech & Geospatial', color: '#E85D04', bg: '#FFECE0',
    sources: [
      { type: 'bing',   query: '"geospatial" startup' },
      { type: 'bing',   query: '"geospatial" funding' },
      { type: 'bing',   query: '"mapping technology" startup' },
      { type: 'bing',   query: '"earth observation" startup' },
      { type: 'bing',   query: '"lidar" startup funding' },
      { type: 'google', query: '("geospatial" OR "earth observation") (startup OR funding)' },
      { type: 'google', query: '"mapping technology" OR "lidar" startup' },
      { type: 'direct', url: 'https://www.geoconnexion.com/news/feed.rss', source: 'GeoConnexion' },
    ]
  },
  {
    id: 'legacy', label: 'Legacy B2B Disruption', color: '#003049', bg: '#E0E9F0',
    sources: [
      { type: 'bing',   query: '"vertical saas" startup' },
      { type: 'bing',   query: '"vertical saas" funding' },
      { type: 'bing',   query: '"construction tech" startup' },
      { type: 'bing',   query: '"proptech" funding' },
      { type: 'bing',   query: '"logistics tech" startup' },
      { type: 'bing',   query: '"supply chain software" startup' },
      { type: 'bing',   query: '"manufacturing AI" startup' },
      { type: 'bing',   query: '"hvac software" startup' },
      { type: 'google', query: '("vertical saas" OR "proptech") (startup OR funding)' },
      { type: 'google', query: '("construction tech" OR "logistics tech" OR "supply chain software") startup' },
      { type: 'direct', url: 'https://www.constructiondive.com/feeds/news/', source: 'Construction Dive' },
      { type: 'direct', url: 'https://www.utilitydive.com/feeds/news/',      source: 'Utility Dive' },
    ]
  }
];

// ── State ─────────────────────────────────────────────────────
let allArticles    = [];
let hiddenArticles = JSON.parse(localStorage.getItem('sr_hidden') || '{}');
let activeTab      = 'all';
let isLoading      = false;

// ── Helpers ───────────────────────────────────────────────────
function fnv1a(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 0x01000193); }
  return ('0000000' + (h >>> 0).toString(16)).slice(-8);
}
function articleId(a) { return 'a' + fnv1a((a.title||'').toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,80)); }
function escHtml(s)   { return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function relTime(ts) {
  if (!ts) return '';
  const diff = Date.now()-ts, h = Math.floor(diff/3600000), dy = Math.floor(h/24);
  if (h < 1)  return 'just now';
  if (h < 24) return `${h}h ago`;
  if (dy < 8) return `${dy}d ago`;
  return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Fetch helpers ─────────────────────────────────────────────
async function fetchUrl(url, attempt = 0) {
  try {
    const res = await fetch(PROXY_BASE + encodeURIComponent(url), { signal: AbortSignal.timeout(FETCH_TIMEOUT_MS) });
    if (res.ok) return await res.text();
    if (attempt === 0) { await sleep(FETCH_RETRY_DELAY_MS); return fetchUrl(url, 1); }
    return '';
  } catch {
    if (attempt === 0) { await sleep(FETCH_RETRY_DELAY_MS); return fetchUrl(url, 1); }
    return '';
  }
}

async function fetchViaJina(articleUrl) {
  try {
    const res = await fetch(JINA_READER_BASE + articleUrl, {
      headers: {
        'Accept': 'text/plain, text/markdown, */*',
        'X-Remove-Selector': 'img, figure, picture, video, iframe, .ad, .advertisement, .promo, [class*="related"], [class*="newsletter"], [class*="subscribe"]',
        'X-Return-Format': 'text',
      },
      signal: AbortSignal.timeout(READER_FETCH_TIMEOUT_MS),
    });
    if (!res.ok) return '';
    return await res.text() || '';
  } catch { return ''; }
}

// ── D1 feedback API ───────────────────────────────────────────
// postFeedback is fire-and-forget; failures are silent so a flaky
// network never blocks the UI interaction that triggered the call.
async function postFeedback(articleId, { dismissed, rating } = {}) {
  try {
    await fetch(`${API_BASE}/api/feedback`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ articleId, deviceId: DEVICE_ID, dismissed, rating }),
      signal: AbortSignal.timeout(8000),
    });
  } catch { /* silent — never block the UI */ }
}

// Pull server-side dismiss list for this device and merge into
// the local hiddenArticles map. Called once on startup so dismisses
// made on other devices (or after a localStorage clear) come back.
async function syncDismissesFromServer() {
  try {
    const res = await fetch(`${API_BASE}/api/state?device=${encodeURIComponent(DEVICE_ID)}`, {
      signal: AbortSignal.timeout(8000),
    });
    if (!res.ok) return;
    const data = await res.json();
    if (!Array.isArray(data.mine)) return;

    let changed = false;
    if (!hiddenArticles.__meta) hiddenArticles.__meta = {};

    data.mine.forEach(row => {
      if (row.dismissed && !hiddenArticles[row.article_id]) {
        hiddenArticles[row.article_id] = true;
        hiddenArticles.__meta[row.article_id] = Date.now();
        changed = true;
      }
    });

    if (changed) localStorage.setItem('sr_hidden', JSON.stringify(hiddenArticles));
  } catch { /* D1 unavailable — local-only mode, no problem */ }
}

// ── Dismiss (local + D1) ──────────────────────────────────────
function hideArticle(id) {
  hiddenArticles[id] = true;
  if (!hiddenArticles.__meta) hiddenArticles.__meta = {};
  hiddenArticles.__meta[id] = Date.now();
  localStorage.setItem('sr_hidden', JSON.stringify(hiddenArticles));
  // Sync to D1 in the background — fire and forget
  postFeedback(id, { dismissed: true });
}

// ── Hidden-article pruning ────────────────────────────────────
function pruneHiddenArticles() {
  const now = Date.now();
  if (!hiddenArticles.__meta) hiddenArticles.__meta = {};
  const currentIds = new Set(allArticles.map(a => a.id));
  let changed = false;

  Object.keys(hiddenArticles).forEach(id => {
    if (id === '__meta') return;
    if (!hiddenArticles.__meta[id]) { hiddenArticles.__meta[id] = now; changed = true; }
  });
  Object.keys(hiddenArticles).forEach(id => {
    if (id === '__meta') return;
    const hiddenAt = hiddenArticles.__meta[id] || now;
    if (!currentIds.has(id) && (now - hiddenAt) > HIDDEN_RETENTION_MS) {
      delete hiddenArticles[id];
      delete hiddenArticles.__meta[id];
      changed = true;
    }
  });

  if (changed) localStorage.setItem('sr_hidden', JSON.stringify(hiddenArticles));
}

// ── RSS parsing ───────────────────────────────────────────────
function resolveGoogleNewsLink(rawLink, sourceUrlAttr) {
  if (sourceUrlAttr && /^https?:\/\//.test(sourceUrlAttr)) return sourceUrlAttr;
  if (!rawLink) return rawLink;
  try {
    const u = new URL(rawLink);
    if (!u.hostname.endsWith('news.google.com')) return rawLink;
    const qp = u.searchParams.get('url');
    if (qp) return qp;
    return rawLink;
  } catch { return rawLink; }
}

function parseXml(xmlStr, feed, sourceType) {
  try {
    const doc = new DOMParser().parseFromString(xmlStr, 'application/xml');
    if (doc.querySelector('parsererror')) return [];
    return Array.from(doc.querySelectorAll('item')).map(el => {
      let title = (el.querySelector('title')?.textContent||'').replace(/\s[-–]\s[^-–]{1,50}$/,'').trim();
      let link  = el.querySelector('link')?.textContent || el.querySelector('guid')?.textContent || '#';
      const sourceEl = el.querySelector('source');
      let source = sourceEl?.textContent || feed.label;
      if (sourceType === 'google') link = resolveGoogleNewsLink(link, sourceEl?.getAttribute('url'));
      const publishedAt = new Date(el.querySelector('pubDate')?.textContent||'').getTime() || 0;
      const excerpt = (new DOMParser().parseFromString(el.querySelector('description')?.textContent||'','text/html').body.textContent||'').trim().slice(0,200);
      if (!title || title.length < 6) return null;
      return { feedId: feed.id, id: articleId({title}), title, link, source, publishedAt, excerpt };
    }).filter(Boolean);
  } catch { return []; }
}

async function fetchSource(source, feed) {
  let url = '';
  if      (source.type === 'bing')   url = `https://www.bing.com/news/search?q=${encodeURIComponent(source.query)}&format=rss`;
  else if (source.type === 'google') url = `https://news.google.com/rss/search?q=${encodeURIComponent(source.query)}&hl=en-US&gl=US&ceid=US:en`;
  else                               url = source.url;

  const body = await fetchUrl(url);
  if (!body) return [];
  let parsed = parseXml(body, feed, source.type);
  if (source.type === 'direct' && source.source) parsed = parsed.map(a => ({...a, source: a.source||source.source}));
  return parsed.filter(a => (Date.now()-a.publishedAt) <= MAX_AGE_MS && !isStockNoise(a));
}

// ── IndexedDB cache ───────────────────────────────────────────
const idb = {
  async open() {
    return new Promise((res,rej) => {
      const req = indexedDB.open('startup_radar_db', 1);
      req.onupgradeneeded = () => { if (!req.result.objectStoreNames.contains('articles')) req.result.createObjectStore('articles',{keyPath:'id'}); };
      req.onsuccess = () => res(req.result);
      req.onerror   = () => rej(req.error);
    });
  },
  async get() {
    try { const d = await this.open(); return await new Promise(r => d.transaction('articles').objectStore('articles').getAll().onsuccess = e => r(e.target.result)); }
    catch { return []; }
  },
  async put(arts) {
    try {
      const d = await this.open();
      await new Promise((resolve,reject) => {
        const tx = d.transaction('articles','readwrite'), st = tx.objectStore('articles');
        arts.forEach(a => st.put(a));
        tx.oncomplete = resolve; tx.onerror = () => reject(tx.error); tx.onabort = () => reject(tx.error);
      });
      await new Promise((resolve,reject) => {
        const tx2 = d.transaction('articles','readwrite'), st2 = tx2.objectStore('articles');
        st2.openCursor().onsuccess = e => { const c = e.target.result; if (c) { if (Date.now()-c.value.publishedAt > MAX_AGE_MS) c.delete(); c.continue(); } };
        tx2.oncomplete = resolve; tx2.onerror = () => reject(tx2.error); tx2.onabort = () => reject(tx2.error);
      });
    } catch {}
  }
};

// ── Load ──────────────────────────────────────────────────────
async function loadAll() {
  if (isLoading) return; isLoading = true;
  document.getElementById('progress-wrap').classList.add('visible');
  document.getElementById('refresh-btn').classList.add('spinning');

  // Pull server-side dismisses first so they're in place before rendering
  await syncDismissesFromServer();

  const local = await idb.get();
  if (local.length) { allArticles = local; renderTabs(); renderGrid(); }

  const sources = FEEDS.flatMap(feed => feed.sources.map(src => ({src,feed})));
  const total   = sources.length;
  let done      = 0;
  const merged  = new Map(allArticles.map(a => [a.id, a]));

  const fetchPromises = sources.map(async ({src, feed}) => {
    try {
      const items = await fetchSource(src, feed);
      items.forEach(a => {
        const existing = merged.get(a.id);
        if (existing && a.excerpt==='' && existing.excerpt!=='') return;
        merged.set(a.id, a);
      });
      allArticles = [...merged.values()].sort((a,b) => b.publishedAt-a.publishedAt);
    } catch(e) { console.warn('Source failed:',src,e); }
    finally {
      done++;
      document.getElementById('progress-bar').style.width = `${Math.round((done/total)*100)}%`;
      renderTabs(); renderGrid();
    }
  });

  await Promise.allSettled(fetchPromises);
  pruneHiddenArticles();
  idb.put(allArticles);
  document.getElementById('progress-wrap').classList.remove('visible');
  document.getElementById('refresh-btn').classList.remove('spinning');
  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  isLoading = false;
}

// ── Render ────────────────────────────────────────────────────
function visibleList() {
  return allArticles
    .filter(a => !hiddenArticles[a.id])
    .filter(a => activeTab==='all' || a.feedId===activeTab);
}

function renderTabs() {
  const counts = {all:0};
  allArticles.filter(a => !hiddenArticles[a.id]).forEach(a => { counts.all++; counts[a.feedId]=(counts[a.feedId]||0)+1; });
  const defs = [{id:'all',label:'All',color:'#1A1511',count:counts.all}, ...FEEDS.map(f=>({id:f.id,label:f.label,color:f.color,count:counts[f.id]||0}))];
  document.getElementById('tabs').innerHTML = defs.map(t =>
    `<div class="tab ${t.id===activeTab?'active':''}" data-tab="${t.id}"><span class="tab-dot" style="background:${t.color}"></span>${t.label} <span class="tab-count">${t.count}</span></div>`
  ).join('');
}

function renderGrid() {
  const grid = document.getElementById('grid'), list = visibleList();
  if (!list.length) return void (grid.innerHTML = `<div class="empty">No articles yet. Click Refresh to scan.</div>`);
  grid.innerHTML = list.map(a => {
    const f = FEEDS.find(x => x.id===a.feedId)||FEEDS[0];
    return `<div class="card-wrap" data-id="${a.id}">
      <div class="card-under">Hidden</div>
      <div class="card" data-id="${a.id}">
        <div class="card-top"><span class="badge" style="color:${f.color};background:${f.bg}">${f.label}</span><span class="card-src">${escHtml(a.source)}</span></div>
        <div class="card-title"><a href="${escHtml(a.link)}" target="_blank">${escHtml(a.title)}</a></div>
        ${a.excerpt?`<div class="card-excerpt">${escHtml(a.excerpt)}</div>`:''}
        <div class="card-foot">
          <span class="card-date">${relTime(a.publishedAt)}</span>
          <div class="card-actions">
            <button class="act-btn" data-reader="${a.id}">Reader / PDF</button>
            <a class="act-btn" href="${escHtml(a.link)}" target="_blank" rel="noopener">Open →</a>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('tabs').addEventListener('click', e => {
  const t = e.target.closest('[data-tab]');
  if (t) { activeTab = t.dataset.tab; renderTabs(); renderGrid(); }
});
document.getElementById('refresh-btn').addEventListener('click', loadAll);

// ── Touch swipe to dismiss ────────────────────────────────────
let swipe = null;
const grid = document.getElementById('grid');

grid.addEventListener('touchstart', e => {
  const c = e.target.closest('.card');
  if (c && !e.target.closest('a, button')) swipe = {card:c, x0:e.touches[0].clientX, dx:0, active:false};
}, {passive:true});

grid.addEventListener('touchmove', e => {
  if (!swipe) return;
  swipe.dx = e.touches[0].clientX - swipe.x0;
  if (!swipe.active && Math.abs(swipe.dx) > 15) { swipe.active=true; swipe.card.closest('.card-wrap').classList.add('swipe-on'); }
  if (swipe.active) swipe.card.style.transform = `translateX(${swipe.dx}px)`;
}, {passive:true});

grid.addEventListener('touchend', () => {
  if (!swipe || !swipe.active) return;
  const {card, dx} = swipe; swipe = null;
  if (Math.abs(dx) > 100) {
    // hideArticle handles both localStorage AND D1 sync
    hideArticle(card.dataset.id);
    card.classList.add('flying');
    card.style.transform = `translateX(${(dx>0?1:-1)*500}px)`;
    setTimeout(() => { renderTabs(); renderGrid(); }, 300);
  } else {
    card.style.transform = '';
    card.closest('.card-wrap').classList.remove('swipe-on');
  }
});

// ── Reader view ───────────────────────────────────────────────
let readerArticle = null, readerParas = [];

function parseJinaText(raw) {
  if (!raw || raw.length < 100) return [];
  const lines = raw.split('\n');
  const blocks = [];
  let inFrontmatter = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (i===0 && line==='---') { inFrontmatter=true; continue; }
    if (inFrontmatter) { if (line==='---') inFrontmatter=false; continue; }
    if (!line) continue;
    if (/^#{1,3}\s/.test(line)) { const text=line.replace(/^#{1,3}\s+/,'').trim(); if (text.length>3) blocks.push({tag:'h2',text}); continue; }
    if (/^(Title|URL|Published|Author|Source|Image):/i.test(line)) continue;
    if (/^\[.*\]\(.*\)$/.test(line) || line.startsWith('![')) continue;
    if (line.length < 30) continue;
    const text = line.replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').replace(/`(.+?)`/g,'$1').trim();
    if (text.length >= 30) blocks.push({tag:'p',text});
  }
  return blocks.filter((b,i) => !i || b.text!==blocks[i-1].text).slice(0,200);
}

function extractArticleHtml(html) {
  const doc = new DOMParser().parseFromString(html,'text/html');
  doc.querySelectorAll('script,style,noscript,nav,header,footer,aside,form,iframe,svg,button,[role="navigation"],[class*="related"],[class*="newsletter"],[class*="subscribe"],[class*="promo"],[class*="comment"]').forEach(n=>n.remove());
  let best = doc.querySelector('article');
  if (!best) {
    let bestLen=0;
    doc.querySelectorAll('main,section,div').forEach(el => { let len=0; el.querySelectorAll('p').forEach(p=>len+=(p.textContent||'').length); if(len>bestLen){bestLen=len;best=el;} });
  }
  if (!best) best = doc.body;
  const out=[];
  best.querySelectorAll('h1,h2,h3,p,li,blockquote').forEach(el => {
    const txt=(el.textContent||'').replace(/\s+/g,' ').trim();
    if(txt.length<30 && !/^h[1-3]$/i.test(el.tagName)) return;
    if(txt.length<4) return;
    out.push({tag:/^h[1-3]$/i.test(el.tagName)?'h2':'p',text:txt});
  });
  return out.filter((b,i)=>!i||b.text!==out[i-1].text).slice(0,220);
}

async function openReader(id) {
  const a = allArticles.find(x => x.id===id);
  if (!a) return;
  readerArticle = a; readerParas = [];
  document.getElementById('reader-title').textContent = a.source||'';
  const inner = document.getElementById('reader-inner');
  inner.innerHTML = `<h1>${escHtml(a.title)}</h1>
    <div class="reader-meta">${escHtml(a.source)} · ${relTime(a.publishedAt)} · <a href="${escHtml(a.link)}" target="_blank" rel="noopener">original article</a></div>
    <div class="reader-loading">Fetching article…</div>`;
  document.getElementById('reader').classList.add('open');

  const jinaText = await fetchViaJina(a.link);
  if (!readerArticle || readerArticle.id!==id) return;
  if (jinaText) readerParas = parseJinaText(jinaText);

  if (!readerParas.length) {
    const html = await fetchUrl(a.link);
    if (!readerArticle || readerArticle.id!==id) return;
    if (html) readerParas = extractArticleHtml(html);
  }

  const loadingEl = inner.querySelector('.reader-loading');
  if (!readerParas.length) {
    if (loadingEl) loadingEl.outerHTML = `<div class="reader-blocked">
      <p>This article couldn't be fetched — the site may require a subscription or block automated access.</p>
      <p><a href="${escHtml(a.link)}" target="_blank" rel="noopener">Open the original article →</a></p>
    </div>`;
    return;
  }
  if (loadingEl) loadingEl.remove();
  inner.insertAdjacentHTML('beforeend', readerParas.map(b=>`<${b.tag}>${escHtml(b.text)}</${b.tag}>`).join(''));
}

function closeReader() { document.getElementById('reader').classList.remove('open'); readerArticle=null; }

// ── PDF export ────────────────────────────────────────────────
let jsPdfPromise = null;
function loadJsPdf() {
  if (window.jspdf) return Promise.resolve();
  if (!jsPdfPromise) jsPdfPromise = new Promise((resolve,reject) => {
    const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=resolve; s.onerror=reject; document.head.appendChild(s);
  });
  return jsPdfPromise;
}

async function downloadPdf() {
  if (!readerArticle) return;
  try { await loadJsPdf(); } catch { alert('PDF library failed to load. Try Print instead.'); return; }
  const {jsPDF}=window.jspdf, doc=new jsPDF({unit:'pt',format:'letter'});
  const W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight(), M=54, maxW=W-M*2;
  let y=M;
  const add=(h)=>{ if(y+h>H-M){doc.addPage();y=M;} };
  doc.setFont('helvetica','bold'); doc.setFontSize(16);
  for(const l of doc.splitTextToSize(readerArticle.title,maxW)){add(20);doc.text(l,M,y);y+=20;}
  y+=4; doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(120);
  const meta=`${readerArticle.source||''} · ${new Date(readerArticle.publishedAt||Date.now()).toLocaleDateString()} · ${readerArticle.link}`;
  for(const l of doc.splitTextToSize(meta,maxW)){add(12);doc.text(l,M,y);y+=12;}
  y+=10; doc.setDrawColor(200); doc.line(M,y,W-M,y); y+=18; doc.setTextColor(30);
  const blocks=readerParas.length?readerParas:[{tag:'p',text:readerArticle.excerpt||'(Full text not available — excerpt only.)'}];
  for(const b of blocks){
    if(b.tag==='h2'){doc.setFont('helvetica','bold');doc.setFontSize(12);y+=6;}
    else{doc.setFont('helvetica','normal');doc.setFontSize(10.5);}
    for(const l of doc.splitTextToSize(b.text,maxW)){add(15);doc.text(l,M,y);y+=15;}
    y+=6;
  }
  doc.setFontSize(8); doc.setTextColor(150);
  doc.save((readerArticle.title||'article').replace(/[^a-z0-9]+/gi,'-').slice(0,60)+'.pdf');
}

grid.addEventListener('click', e => { const rd=e.target.closest('[data-reader]'); if(rd) openReader(rd.dataset.reader); });
document.getElementById('reader-close').addEventListener('click', closeReader);
document.getElementById('reader-print').addEventListener('click', () => window.print());
document.getElementById('reader-pdf').addEventListener('click', downloadPdf);

loadAll();
</script>
